<svg xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 64 64">

    <defs>

    <linearGradient id="folder"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                    y2="100%">
        <stop offset="0%" stop-color="#DFFBFF"/>
        <stop offset="100%" stop-color="#79DFFF"/>
    </linearGradient>

    <linearGradient id="doc"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                    y2="100%">
        <stop offset="0%" stop-color="#FFFFFF"/>
        <stop offset="100%" stop-color="#B7F4FF"/>
    </linearGradient>

    <filter id="glow">
    <feDropShadow dx="0"
                    dy="0"
                    stdDeviation="2"
                    flood-color="#00E5FF"
                    flood-opacity="0.8"/>
    </filter>

    </defs>

    <!-- Folder Back -->

    <path d="
            M8 18
            H24
            L28 14
            H52
            C55 14 57 16 57 19
            V42
            H8
            Z"
        fill="url(#folder)"
        stroke="#7CEFFF"
        stroke-width="1.5"/>

    <!-- Documents -->

    <g filter="url(#glow)">

    <rect x="19"
            y="18"
            width="10"
            height="15"
            rx="1.5"
            fill="url(#doc)"
            stroke="#00DFFF"
            stroke-width="1"/>

    <rect x="28"
            y="16"
            width="10"
            height="15"
            rx="1.5"
            fill="url(#doc)"
            stroke="#00DFFF"
            stroke-width="1"/>

    <rect x="37"
            y="18"
            width="10"
            height="15"
            rx="1.5"
            fill="url(#doc)"
            stroke="#00DFFF"
            stroke-width="1"/>

    </g>

    <!-- Folder Front -->

    <path d="
            M6 24
            H58
            L54 50
            H10
            Z"
        fill="url(#folder)"
        stroke="#7CEFFF"
        stroke-width="1.5"/>

</svg>