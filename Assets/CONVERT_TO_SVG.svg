<svg xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 64 64">

    <defs>

    <linearGradient id="arrowGrad"
                    x1="0%" y1="0%"
                    x2="100%" y2="0%">
        <stop offset="0%" stop-color="#00E5FF"/>
        <stop offset="100%" stop-color="#7C5CFF"/>
    </linearGradient>

    <linearGradient id="docGrad"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                    y2="100%">
        <stop offset="0%" stop-color="#FFFFFF"/>
        <stop offset="100%" stop-color="#BDF4FF"/>
        </linearGradient>

        <filter id="glow">
        <feDropShadow dx="0"
                    dy="0"
                    stdDeviation="1"
                    flood-color="#00E5FF"
                    flood-opacity="0.85"/>
    </filter>

    </defs>

    <!-- Raster Image -->

  <rect x="6"
        y="22"
        width="14"
        height="14"
        rx="2"
        fill="#102334"
        stroke="#6EEFFF"
        stroke-width="1"/>

    <rect x="8"  y="24" width="3" height="3" fill="#00E5FF"/>
    <rect x="12" y="24" width="3" height="3" fill="#7DEFFF"/>
    <rect x="16" y="24" width="2" height="3" fill="#BFFFFF"/>

    <rect x="8"  y="28" width="3" height="3" fill="#7DEFFF"/>
    <rect x="12" y="28" width="3" height="3" fill="#00E5FF"/>
    <rect x="16" y="28" width="2" height="3" fill="#BFFFFF"/>

    <!-- Arrow -->

    <g filter="url(#glow)">

        <path d="M24 29 H38"
            fill="none"
            stroke="url(#arrowGrad)"
            stroke-width="2.5"
            stroke-linecap="round"/>

        <path d="M33 24 L40 29 L33 34"
            fill="none"
            stroke="url(#arrowGrad)"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"/>

    </g>

    <!-- Compact SVG Document -->

    <path d="
            M44 18
            H54
            L58 22
            V42
            C58 44 56 46 54 46
            H44
            C42 46 40 44 40 42
            V22
            C40 20 42 18 44 18
            Z"
        fill="url(#docGrad)"
        stroke="#00DFFF"
        stroke-width="1"/>

    <path d="
            M54 18
            V22
            H58"
            fill="none"
        stroke="#FFFFFF"
        stroke-width="1"/>

    <!-- Vector Curve -->

    <path d="
            M45 37
            C48 29 52 29 55 36"
        fill="none"
        stroke="#00DFFF"
        stroke-width="1.2"/>

    <line x1="45"
        y1="37"
        x2="48"
        y2="29"
        stroke="#CFFFFF"
        stroke-width="0.7"/>

    <line x1="55"
        y1="36"
        x2="52"
        y2="29"
        stroke="#CFFFFF"
        stroke-width="0.7"/>

    <circle cx="45"
            cy="37"
            r="1.2"
            fill="#00DFFF"/>

    <circle cx="48"
            cy="29"
            r="0.9"
            fill="#FFFFFF"/>

    <circle cx="52"
            cy="29"
            r="0.9"
            fill="#FFFFFF"/>

    <circle cx="55"
            cy="36"
            r="1.2"
            fill="#00DFFF"/>

</svg>