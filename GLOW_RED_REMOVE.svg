<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="24"
     height="24"
     viewBox="0 0 24 24"
     fill="none">

    <defs>
        <filter id="softRedGlow"
                x="-10%"
                y="-10%"
                width="120%"
                height="120%">

            <feGaussianBlur stdDeviation="0.3"
                            result="blur"/>

            <feColorMatrix
                in="blur"
                type="matrix"
                values="
