<svg xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 64 64">

    <defs>

    <linearGradient id="doc"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                        y2="100%">
        <stop offset="0%" stop-color="#F8FDFF"/>
        <stop offset="100%" stop-color="#9BEFFF"/>
    </linearGradient>

    <linearGradient id="accent"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                        y2="100%">
        <stop offset="0%" stop-color="#00E5FF"/>
        <stop offset="100%" stop-color="#00AFFF"/>
    </linearGradient>

    <filter id="glow">
        <feDropShadow dx="0"
                    dy="0"
                    stdDeviation="2"
                    flood-color="#00E5FF"
                    flood-opacity="0.9"/>
    </filter>

    </defs>

    <!-- Document -->

    <path d="
            M14 8
            H34
            L46 20
            V50
            C46 53 44 55 41 55
            H14
            C11 55 9 53 9 50
            V13
            C9 10 11 8 14 8
            Z"
        fill="url(#doc)"
        stroke="#7CEFFF"
        stroke-width="1.5"/>

    <!-- Fold -->

    <path d="
            M34 8
            V20
            H46"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="1.5"/>

    <!-- Large Plus -->

    <g filter="url(#glow)">

    <rect x="26"
            y="26"
            width="6"
            height="18"
            rx="2"
            fill="url(#accent)"/>

    <rect x="20"
            y="32"
            width="18"
            height="6"
            rx="2"
            fill="url(#accent)"/>

    </g>

    <!-- Simple SVG Curve -->

    <path d="
            M16 47
            C22 39 30 39 37 47"
        fill="none"
        stroke="#00DFFF"
        stroke-width="1.5"/>

    <!-- Anchor Points -->

    <circle cx="16" cy="47" r="1.5"
            fill="#00DFFF"/>

    <circle cx="37" cy="47" r="1.5"
            fill="#00DFFF"/>

</svg>