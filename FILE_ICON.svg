<svg xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 256 256">

    <defs>

        <linearGradient id="doc"
                        x1="0%"
                        y1="0%"
                        x2="100%"
                        y2="100%">
            <stop offset="0%" stop-color="#24384E"/>
            <stop offset="100%" stop-color="#0B121A"/>
        </linearGradient>

        <linearGradient id="edge"
                        x1="0%"
                        y1="0%"
                        x2="100%"
                        y2="100%">
            <stop offset="0%" stop-color="#00E5FF"/>
            <stop offset="50%" stop-color="#4CCBFF"/>
            <stop offset="100%" stop-color="#7B5CFF"/>
        </linearGradient>

        <filter id="glow">
            <feDropShadow dx="0"
                            dy="0"
                            stdDeviation="6"
                            flood-color="#00E5FF"
                            flood-opacity="0.9"/>
        </filter>

    </defs>

    <!-- Document -->

    <path d="
                M56 20
                H156
                L212 76
                V214
                C212 224 204 232 194 232
                H56
                C46 232 38 224 38 214
                V38
                C38 28 46 20 56 20
                Z"
            fill="url(#doc)"
            stroke="url(#edge)"
            stroke-width="4"/>

    <!-- Folded Corner -->

    <path d="
                M156 20
                V76
                H212"
            fill="none"
            stroke="#E8FFFF"
            stroke-width="4"/>

    <!-- Glass Reflection -->

    <path d="
                M70 44
                C110 28 145 28 180 44"
            fill="none"
            stroke="#FFFFFF"
            stroke-opacity="0.18"
            stroke-width="8"
            stroke-linecap="round"/>

    <!-- SVG Symbol -->

    <g filter="url(#glow)">

        <path d="
                    M82 145
                    C108 95
                    142 95
                    170 142"
                fill="none"
                stroke="#78F8FF"
                stroke-width="10"
                stroke-linecap="round"/>

    </g>

    <!-- Handles -->

    <line x1="82"
            y1="145"
            x2="108"
            y2="95"
            stroke="#CFFFFF"
            stroke-width="2"/>

    <line x1="170"
            y1="142"
            x2="142"
            y2="95"
            stroke="#CFFFFF"
            stroke-width="2"/>

    <!-- Nodes -->

    <circle cx="82"
            cy="145"
            r="9"
            fill="#00E5FF"/>

    <circle cx="108"
            cy="95"
            r="6"
            fill="#FFFFFF"/>

    <circle cx="142"
            cy="95"
            r="6"
            fill="#FFFFFF"/>

    <circle cx="170"
            cy="142"
            r="9"
            fill="#00E5FF"/>

    <!-- Bottom SVG Label -->

    <rect x="62"
            y="174"
            width="126"
            height="36"
            rx="10"
            fill="#071019"
            opacity="0.95"
            stroke="#00DFFF"
            stroke-width="2"/>

    <text x="125"
            y="199"
            text-anchor="middle"
            font-family="Segoe UI, Arial, sans-serif"
            font-size="22"
            font-weight="700"
            fill="#EFFFFF"
            letter-spacing="2">
        SVG
    </text>

</svg>